# Tmux config

# Terminal settings
set -gu terminal-overrides
set -gu terminal-features
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",xterm-ghostty:extkeys"
set -s extended-keys always
set -g extended-keys-format csi-u

# Allow terminal passthrough
set -g allow-passthrough on

# Leader/prefix: Ctrl-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g status-keys vi
setw -g mode-keys vi
set -g status-position top
set -g status off

# General keybinds
bind R source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded tmux config"
bind b copy-mode
bind q confirm-before -p "Kill tmux session? (y/n)" kill-session

# Pane splitting
bind - split-window -v
bind _ split-window -v -f
bind '\' split-window -h
bind | split-window -h -f

# Pane navigation
bind p choose-tree
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind [ select-pane -t :.-
bind ] select-pane -t :.+
bind f resize-pane -Z

# Popups / integrations
bind g new-window -n lazygit lazygit
bind e new-window -n pick tmux-file-picker
bind s run-shell "tmux display-popup -E -w 90% -h 90% tmux-repo-cmd-picker 2>/dev/null || tmux new-window -n repo-cmd tmux-repo-cmd-picker"

# Tab/window navigation (prefix + number)
bind t choose-tree -w
bind 1 select-window -t :1
bind 2 select-window -t :2
bind 3 select-window -t :3
bind 4 select-window -t :4
bind 5 select-window -t :5
bind 6 select-window -t :6
bind 7 select-window -t :7
bind 8 select-window -t :8
bind 9 select-window -t :9

# TPM plugin manager
if-shell '[ ! -d ~/.tmux/plugins/tpm ]' 'run-shell "git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm"'
set -g @plugin 'tmux-plugins/tpm'

run '~/.tmux/plugins/tpm/tpm'
