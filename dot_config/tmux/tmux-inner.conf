# Nested tmux for the bottom shell pane in tmux-workspace.

unbind C-b
set -g prefix M-Space
bind M-Space send-prefix

set -gu terminal-features
set -g default-terminal "tmux-256color"
set -as terminal-features ",tmux-256color:RGB"
set -as terminal-features ",tmux-256color:extkeys"
set -s extended-keys always
set -g extended-keys-format csi-u
set -g allow-passthrough on
set -g mouse on
set -g history-limit 100000
set -g base-index 1
set -g renumber-windows on
set -g status-keys vi
setw -g mode-keys vi
set -g detach-on-destroy off
set -g status-position top
set -gu status-format
set -g status-style "fg=#e0def4,bg=#191724"
set -g message-style "fg=#e0def4,bg=#26233a"
set -g window-status-style "fg=#6e6a86,bg=#26233a"
set -g window-status-current-style "fg=#c4a7e7,bg=#26233a"
set -g status-left-length 0
set -g status-right-length 0
set -g status-left ""
set -g status-right ""
set -g status-justify left
#set -g window-status-separator " "
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[reverse] #I:#W #[default]"

# Window/tab workflow
bind n new-window
bind ] next-window
bind [ previous-window
bind R source-file ~/.config/tmux/tmux-inner.conf \; display-message "Reloaded tmux config"
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind x confirm-before -p "Kill shell tab #W? (y/n)" kill-window
bind b copy-mode
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "tmux-copy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "tmux-copy"
bind f display-popup -E -w 70% -h 70% "tmux-shell-picker"
