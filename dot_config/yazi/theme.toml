# Rose Pine theme for yazi
[mgr]
cwd = { fg = "#c4a7e7" }
hovered = { fg = "#e0def4", bg = "#26233a", bold = true }
preview_hovered = { underline = true }
find_keyword = { fg = "#f6c177", bold = true }
find_position = { fg = "#c4a7e7", italic = true }
marker_selected = { fg = "#31748f", bg = "#31748f" }
marker_copied = { fg = "#9ccfd8", bg = "#9ccfd8" }
marker_cut = { fg = "#eb6f92", bg = "#eb6f92" }
tab_active = { fg = "#e0def4", bg = "#26233a" }
tab_inactive = { fg = "#908caa", bg = "#191724" }
tab_width = 1
border_symbol = "│"
border_style = { fg = "#403d52" }

[status]
separator_open = ""
separator_close = ""
separator_style = { fg = "#26233a", bg = "#26233a" }
mode_normal = { fg = "#191724", bg = "#c4a7e7", bold = true }
mode_select = { fg = "#191724", bg = "#31748f", bold = true }
mode_unset = { fg = "#191724", bg = "#eb6f92", bold = true }
progress_label = { fg = "#e0def4", bold = true }
progress_normal = { fg = "#26233a", bg = "#191724" }
progress_error = { fg = "#eb6f92", bg = "#191724" }
permissions_t = { fg = "#31748f" }
permissions_r = { fg = "#f6c177" }
permissions_w = { fg = "#eb6f92" }
permissions_x = { fg = "#9ccfd8" }
permissions_s = { fg = "#908caa" }

[input]
border = { fg = "#c4a7e7" }
title = {}
value = {}
selected = { reversed = true }

[select]
border = { fg = "#c4a7e7" }
active = { fg = "#c4a7e7" }
inactive = {}

[tasks]
border = { fg = "#c4a7e7" }
title = {}
hovered = { underline = true }

[which]
mask = { bg = "#191724" }
cand = { fg = "#9ccfd8" }
rest = { fg = "#908caa" }
desc = { fg = "#c4a7e7" }
separator = " → "
separator_style = { fg = "#403d52" }

[help]
on = { fg = "#c4a7e7" }
run = { fg = "#908caa" }
desc = {}
hovered = { bg = "#26233a", bold = true }
footer = { fg = "#e0def4", bg = "#191724" }

[filetype]
rules = [
  { mime = "image/*", fg = "#9ccfd8" },
  { mime = "video/*", fg = "#f6c177" },
  { mime = "audio/*", fg = "#f6c177" },
  { mime = "application/zip", fg = "#c4a7e7" },
  { mime = "application/gzip", fg = "#c4a7e7" },
  { name = "*/", fg = "#c4a7e7", bold = true },
  { name = "*.md", fg = "#9ccfd8" },
  { name = "*.rs", fg = "#eb6f92" },
  { name = "*.lua", fg = "#31748f" },
  { name = "*.py", fg = "#f6c177" },
  { name = "*.ts", fg = "#31748f" },
  { name = "*.js", fg = "#f6c177" },
  { name = "*.json", fg = "#908caa" },
  { name = "*.toml", fg = "#908caa" },
  { name = "*.yaml", fg = "#908caa" },
  { name = "*.yml", fg = "#908caa" },
  { name = ".git*", fg = "#908caa", italic = true },
  { name = ".*", fg = "#908caa" },
]
